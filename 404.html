<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Out of frame — BIMVAA STUDIO</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&family=IBM+Plex+Mono:wght@500&family=Inter:wght@400&display=swap" rel="stylesheet" />
<style>
  :root{--stage:#E4DBCB;--ink:#2A241C;--smoke:#574E42;--tung:#855420;--line:#C7BCA8;--onmedia:#ECE6D9}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--stage);color:var(--ink);min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;line-height:1.6}
  .mark{width:74px;height:74px;margin-bottom:2rem}
  .code{font-family:"IBM Plex Mono",monospace;font-weight:500;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--tung)}
  h1{font-family:"Fraunces",Georgia,serif;font-weight:300;font-size:clamp(2.4rem,8vw,4rem);line-height:1.05;margin:.8rem 0 .6rem}
  h1 em{font-style:italic;color:var(--tung)}
  p{color:var(--smoke);max-width:42ch;margin:0 auto 2rem}
  .btn{display:inline-flex;align-items:center;gap:.5rem;font-family:"IBM Plex Mono",monospace;font-weight:500;font-size:.72rem;
    letter-spacing:.14em;text-transform:uppercase;padding:.85rem 1.5rem;border-radius:3px;background:var(--tung);color:var(--onmedia);transition:opacity .25s}
  .btn:hover{opacity:.88}
  a{color:inherit;text-decoration:none}
  .links{margin-top:1.8rem;font-family:"IBM Plex Mono",monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--smoke)}
  .links a{color:var(--smoke);transition:color .25s}.links a:hover{color:var(--tung)}
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="46" fill="none" stroke="#2A241C" stroke-width="2.4"/>
    <g stroke="#2A241C" stroke-width="2.2" stroke-linecap="round">
      <line x1="84" y1="50" x2="59.5" y2="57.4"/><line x1="67" y1="79.4" x2="48.3" y2="61.9"/>
      <line x1="33" y1="79.4" x2="38.9" y2="54.5"/><line x1="16" y1="50" x2="40.5" y2="42.6"/>
      <line x1="33" y1="20.6" x2="51.7" y2="38.1"/><line x1="67" y1="20.6" x2="61.1" y2="45.5"/>
    </g>
    <circle cx="50" cy="50" r="5" fill="#855420"/>
  </svg>
  <p class="code">Error 404</p>
  <h1>This frame's <em>out of focus.</em></h1>
  <p>The page you're after isn't here. Let's get you back to the studio.</p>
  <a class="btn" href="/">Back to BIMVAA</a>
  <p class="links"><a href="/about">About</a> · <a href="/journal">Journal</a> · <a href="/book">Enquire</a></p>
</body>
</html>
